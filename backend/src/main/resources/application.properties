spring.application.name=football-tracker
server.port=8080

# Mac dinh Spring Boot AN truong "message" trong JSON loi (tranh lo thong tin nhay cam).
# Cac ResponseStatusException cua ta chi chua thong bao an toan ("Sai email hoac mat khau"...)
# nen bat len de frontend hien dung cau, khong chi hien "Loi 401".
server.error.include-message=always

# ==== football-data.org config ====
football-data.base-url=https://api.football-data.org/v4
# Cach 1: dat bien moi truong FOOTBALL_DATA_API_KEY
# Cach 2: thay truc tiep chuoi ben duoi bang API key cua ban
football-data.api-key=${FOOTBALL_DATA_API_KEY:PUT_YOUR_API_KEY_HERE}

# ==== Cache (Caffeine) ====
# Goi mien phi chi cho 10 request/phut; vuot qua thi API GIU CHAM request (throttle) ~10-15s.
# TTL cang dai => cang it goi API => trang tai nhanh, it bi throttle.
app.cache.ttl-minutes=30
app.cache.max-size=200

# CORS: dia chi frontend React (Vite mac dinh la 5173)
app.cors.allowed-origin=http://localhost:5173

# ==== SQL Server config ====
# Dat bien moi truong DB_USERNAME / DB_PASSWORD truoc khi chay app (giong FOOTBALL_DATA_API_KEY).
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=football_tracker;encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# ddl-auto=validate: Hibernate CHI kiem tra bang khop entity, KHONG tu tao/sua.
# Schema do FLYWAY quan ly (xem cac file src/main/resources/db/migration/V*.sql).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ==== Flyway (quan ly schema theo phien ban) ====
# Flyway tu chay cac migration V*.sql khi khoi dong, ghi lai trong flyway_schema_history.
# baseline-on-migrate=true: neu DB da co bang san (chua co flyway_schema_history),
# Flyway se "danh dau" DB o version 1 va BO QUA V1, cac migration V2+ moi chay tiep.
# => Dung duoc ca cho DB moi (chay V1 tao bang) lan DB cu (da co bang).
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ==== JWT config ====
# Dat bien moi truong JWT_SECRET (toi thieu 32 ky tu, ngau nhien) truoc khi chay app.
app.jwt.secret=${JWT_SECRET:CHANGE_ME_TO_A_RANDOM_SECRET_AT_LEAST_32_CHARS_LONG}
# Token het han sau 24 gio (don vi: milli-giay)
app.jwt.expiration-ms=86400000

# ==== Job dong bo tran dau (@Scheduled) ====
# Chay lan dau sau 10s, sau do lap lai moi 30 phut. Cua so: 2 ngay truoc -> 14 ngay toi.
app.sync.initial-delay-ms=10000
app.sync.matches-interval-ms=1800000

# ==== Email thong bao doi yeu thich sap thi dau ====
# De GUI email that: tao "App Password" cua Gmail roi dat 2 bien MAIL_USERNAME / MAIL_PASSWORD.
# Neu de trong, app van chay binh thuong nhung chi GHI LOG thay vi gui email.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Job kiem tra moi gio, nhac cac tran se dien ra trong 24 gio toi.
app.notify.initial-delay-ms=30000
app.notify.interval-ms=3600000
app.notify.window-hours=24
