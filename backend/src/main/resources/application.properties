spring.application.name=football-tracker
server.port=8080

# ==== football-data.org config ====
football-data.base-url=https://api.football-data.org/v4
# Cach 1: dat bien moi truong FOOTBALL_DATA_API_KEY
# Cach 2: thay truc tiep chuoi ben duoi bang API key cua ban
football-data.api-key=${FOOTBALL_DATA_API_KEY:PUT_YOUR_API_KEY_HERE}

# CORS: dia chi frontend React (Vite mac dinh la 5173)
app.cors.allowed-origin=http://localhost:5173
