spring.application.name=football-tracker
server.port=${PORT:8080}

server.error.include-message=always

# ==== football-data.org ====
football-data.base-url=https://api.football-data.org/v4
football-data.api-key=${FOOTBALL_DATA_API_KEY:PUT_YOUR_API_KEY_HERE}

# ==== Cache ====
app.cache.ttl-minutes=30
app.cache.max-size=200

# ==== CORS ====
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}

# ==== PostgreSQL (Railway) ====
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/football_tracker}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false


# ==== Flyway (disabled - dung Hibernate ddl-auto thay the) ====
spring.flyway.enabled=false

# ==== JWT ====
app.jwt.secret=${JWT_SECRET:CHANGE_ME_TO_A_RANDOM_SECRET_AT_LEAST_32_CHARS_LONG}
app.jwt.expiration-ms=86400000

# ==== Job dong bo ====
app.sync.initial-delay-ms=10000
app.sync.matches-interval-ms=1800000

# ==== Job cham diem ====
app.predictions.scoring-initial-delay-ms=20000
app.predictions.scoring-interval-ms=1800000

# ==== Email ====
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.enable=true
app.notify.initial-delay-ms=30000
app.notify.interval-ms=3600000
app.notify.window-hours=24


resend.api-key=${RESEND_API_KEY:}